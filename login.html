<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPrime FitTrack</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>
    
   <main class="login-page">
        <div class="right">
            <i class="fa-solid fa-dumbbell"></i>
            <h1>JPrime <span>FitTrack</span></h1>
            <p>Gym Management System — Manage members, track attendance, and streamline operations.</p>
        </div>

        <div class="left">
            <div class="welcome">
                <h3>Welcome Back</h3>
                <p>Sign in to your account to continue</p>
            </div>
               
            <div class="form-container">
                <label for="username">Username</label>
                <input type="text" name="username" id="username" placeholder="Enter your Username" required>
                <label for="password">Password</label>
                <input type="password" name="password" id="password" placeholder="Enter your password" required>

                <button onclick="window.location.href='dashboard.html'" type="submit" class="sign-in">Sign In</button>
            </div>

            <div class="welcome-footer">
                <div class="demo">
                     <p>Demo credentials</p>
                </div>
               <div class="credentials">
                <p>Admin: <span>admin / admin123</span></p>
                <p>Admin: <span>staff /  staff123</span></p>
               </div>
            </div>
            
        </div>
        </main>
</body>
</html>
