<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPrime FitTrack</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <button class="hamburger" id="hamburger" aria-label="Toggle menu"><span></span><span></span><span></span></button>
    <div class="sidebar-overlay" id="overlay"></div>
    <nav class="side-bar" id="sidebar">
        <div class="upper">
            <div class="upper-left">
                <i class="fa-solid fa-dumbbell"></i>
            </div>
            <div class="upper-right">
                <h2>JPrime</h2>
                <p>FitTrack</p>
            </div>
        </div>
            <hr>
        <div class="middle">
            <ul class="middle-list">
                <li><a href="dashboard.html"> <span><i class="fa-solid fa-gauge"></i></span>Dashboard</a></li>
                <li><a href="members.html"><span><i class="fa-solid fa-user-group"></i></span>Members</a></li>
                <li><a class="active" href="attendance.html"><span><i class="fa-solid fa-table"></i></span>Attendance</a></li>
                <li><a href="payments.html"><span><i class="fa-brands fa-paypal"></i></span>Payments</a></li>
                <li><a href="expenses.html"><span><i class="fa-solid fa-dollar-sign"></i></span>Expenses</a></li>
                <li><a href="plans.html"><span><i class="fa-solid fa-clipboard-user"></i></span>Plans</a></li>
                <li><a href="trainers.html"><span><i class="fa-solid fa-dumbbell"></i></span>Trainers</a></li>
            </ul>
        </div>
        <div class="bottom">
            <div class="bottom-left">
                <div class="bottom-icon">
                    <i class="fa-regular fa-user"></i>
                </div>
                <div class="bottom-admin">
                    <p>admin</p>
                    <p>Admin</p>
                </div>
            </div>
            <a class="bottom-right" href="login.html">
             <i class="fa-solid fa-arrow-right"></i>
             </a>
        </div>
    </nav>

    <main class="attendance">
        <div class="attendance-wrapper">
            <div class="attendance-welcome">
                <h1>Attendance</h1>
                <p>Record and track daily member check-ins</p>
            </div>

            <div class="checkin-wrapper">
                <h3><span><i class="fa-solid fa-calendar-check"></i></span>Quick Check-In</h3>
                <div class="checkin-select">
                    <button class="checkin-left">Select Active Member <span><i class="fa-solid fa-angle-down"></i></span></button>
                    <button class="checkin-right"><span><i class="fa-solid fa-calendar-check"></i></span>Check In</button>
                </div>
            </div>

            <div class="checkin-table">
                <h3>Today's Checkin (1)</h3>
                <div class="checkin-person">
                    <p class="person-initial">M</p>
                    <div class="person-details">
                        <p>Maria Santos</p>
                        <p><span><i class="fa-solid fa-clock"></i></span> 15:18</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
      const hamburger = document.getElementById("hamburger");
      const sidebar   = document.getElementById("sidebar");
      const overlay   = document.getElementById("overlay");
      function toggleSidebar() {
        hamburger.classList.toggle("open");
        sidebar.classList.toggle("open");
        overlay.classList.toggle("active");
        document.body.style.overflow = sidebar.classList.contains("open") ? "hidden" : "";
      }
      hamburger.addEventListener("click", toggleSidebar);
      overlay.addEventListener("click", toggleSidebar);
    </script>
</body>
</html>
